<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tu me connais ?</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --a:#E21B3C; --b:#1368CE; --c:#26890C; --d:#FFA602;
  --bg:#1a0533; --card:#260a45; --text:#fff; --muted:#b39dcc;
  --c1:#FF3CAC; --c2:#784BA0; --c3:#2B86C5; --radius:16px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
h1,h2,h3,.title{font-family:'Syne',sans-serif;}
.screen{display:none;min-height:100vh;padding:24px;}
.screen.active{display:flex;flex-direction:column;align-items:center;justify-content:center;}
.btn-group{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;}
.btn{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;padding:14px 32px;border-radius:50px;border:none;cursor:pointer;transition:transform .15s,box-shadow .15s;letter-spacing:.5px;}
.btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.4);}
.btn:active{transform:scale(.97);}
.btn-primary{background:linear-gradient(135deg,var(--c1),var(--c2));color:#fff;box-shadow:0 4px 20px rgba(255,60,172,.4);}
.btn-secondary{background:var(--card);color:var(--text);border:1px solid rgba(255,255,255,.1);}
.btn-sm{padding:8px 18px;font-size:13px;}

/* SPLASH */
#screen-splash{background:var(--bg);text-align:center;gap:32px;position:relative;overflow:hidden;}
#screen-splash::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 15% 25%,rgba(226,27,60,.4) 0%,transparent 45%),radial-gradient(ellipse at 85% 20%,rgba(19,104,206,.4) 0%,transparent 45%),radial-gradient(ellipse at 50% 90%,rgba(255,166,2,.35) 0%,transparent 45%),radial-gradient(ellipse at 80% 70%,rgba(38,137,12,.3) 0%,transparent 40%);pointer-events:none;}
.splash-tag{font-size:13px;letter-spacing:3px;text-transform:uppercase;color:var(--c1);font-weight:600;}
.splash-title{font-size:clamp(52px,10vw,96px);line-height:1;background:linear-gradient(135deg,#fff 0%,var(--c1) 50%,var(--c3) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.splash-sub{font-size:18px;color:var(--muted);max-width:420px;}

/* EDITOR */
#screen-editor{align-items:stretch;justify-content:flex-start;max-width:900px;margin:0 auto;gap:20px;padding:32px 24px;overflow-y:auto;}
.question-card{background:var(--card);border:1px solid rgba(255,255,255,.07);border-radius:var(--radius);padding:20px;display:flex;flex-direction:column;gap:14px;transition:border-color .2s;}
.question-card:hover{border-color:rgba(255,255,255,.15);}
.q-number{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--c1);font-weight:700;}
.q-input{font-family:'DM Sans',sans-serif;font-size:16px;font-weight:600;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:10px;color:var(--text);padding:12px 16px;width:100%;resize:none;transition:border-color .2s;}
.q-input:focus{outline:none;border-color:var(--c1);}
.q-input::placeholder{color:var(--muted);}
.type-selector{display:flex;gap:8px;flex-wrap:wrap;}
.type-pill{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;padding:6px 14px;border-radius:50px;border:2px solid rgba(255,255,255,.15);cursor:pointer;transition:all .15s;color:var(--muted);background:transparent;}
.type-pill.active{border-color:var(--c1);color:#fff;background:rgba(255,60,172,.15);}
.answers-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.answer-row{display:flex;align-items:center;gap:8px;}
.answer-badge{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:14px;flex-shrink:0;}
.badge-a{background:var(--a);color:#fff;} .badge-b{background:var(--b);color:#fff;}
.badge-c{background:var(--c);color:#fff;} .badge-d{background:var(--d);color:#1a1a1a;}
.answer-input{font-family:'DM Sans',sans-serif;font-size:14px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:8px;color:var(--text);padding:8px 12px;flex:1;transition:border-color .2s;}
.answer-input:focus{outline:none;border-color:rgba(255,255,255,.3);}
.correct-check{width:20px;height:20px;accent-color:var(--c);cursor:pointer;flex-shrink:0;}
.img-answer-col{display:flex;flex-direction:column;gap:6px;}
.img-preview-wrap{position:relative;width:100%;aspect-ratio:4/3;background:rgba(255,255,255,.04);border:2px dashed rgba(255,255,255,.15);border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;transition:border-color .2s;}
.img-preview-wrap:hover{border-color:var(--c1);}
.img-preview-wrap img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;}
.img-upload-label{font-size:12px;color:var(--muted);text-align:center;pointer-events:none;z-index:1;padding:8px;}
.img-upload-input{display:none;}
.q-footer{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;}
.timer-select{font-family:'DM Sans',sans-serif;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:8px;color:var(--text);padding:6px 12px;font-size:13px;}
.delete-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:18px;padding:4px 8px;border-radius:6px;transition:color .2s,background .2s;}
.delete-btn:hover{color:#ff4444;background:rgba(255,68,68,.1);}
.add-q-btn{background:rgba(255,255,255,.04);border:2px dashed rgba(255,255,255,.15);border-radius:var(--radius);padding:18px;text-align:center;color:var(--muted);font-family:'Syne',sans-serif;font-size:15px;cursor:pointer;transition:border-color .2s,color .2s,background .2s;width:100%;}
.add-q-btn:hover{border-color:var(--c1);color:var(--c1);background:rgba(255,60,172,.05);}

/* PLAYERS */
#screen-players{gap:24px;max-width:500px;margin:0 auto;padding:40px 24px;}
.player-input-row{display:flex;gap:8px;width:100%;}
.player-tag{display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid rgba(255,255,255,.07);border-radius:50px;padding:6px 16px 6px 8px;font-size:14px;}
.player-avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;font-family:'Syne',sans-serif;}
.player-remove{background:none;border:none;color:var(--muted);cursor:pointer;font-size:15px;padding:0 0 0 6px;}
.player-remove:hover{color:#ff4444;}
.players-wrap{display:flex;flex-wrap:wrap;gap:8px;width:100%;min-height:40px;}

/* GAME */
#screen-game{background:radial-gradient(ellipse at 50% 0%,#3b1a6e 0%,transparent 60%),var(--bg);gap:20px;padding:24px;width:100%;max-width:960px;margin:0 auto;}
.game-top{display:flex;align-items:center;justify-content:space-between;width:100%;}
.game-progress{font-size:13px;color:var(--muted);font-weight:600;}
.game-mode-badge{font-size:11px;letter-spacing:1px;padding:4px 10px;border-radius:50px;font-weight:700;font-family:'Syne',sans-serif;margin-top:4px;display:inline-block;}
.badge-multi{background:rgba(255,166,2,.2);color:var(--d);border:1px solid rgba(255,166,2,.3);}
.badge-single{background:rgba(38,137,12,.2);color:#4dc94d;border:1px solid rgba(38,137,12,.3);}
.timer-ring{position:relative;width:64px;height:64px;}
.timer-ring svg{transform:rotate(-90deg);width:64px;height:64px;}
.timer-ring circle{fill:none;stroke-width:5;}
.timer-bg{stroke:rgba(255,255,255,.1);}
.timer-fg{stroke:var(--c1);stroke-linecap:round;transition:stroke-dashoffset 1s linear,stroke .5s;}
.timer-number{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:22px;font-weight:800;}
.question-text{font-family:'Syne',sans-serif;font-size:clamp(18px,3.5vw,28px);text-align:center;line-height:1.3;max-width:760px;padding:24px 28px;background:var(--card);border-radius:20px;border:1px solid rgba(255,255,255,.08);width:100%;}

/* TEXT answer buttons */
.answers-game{display:grid;grid-template-columns:1fr 1fr;gap:14px;width:100%;max-width:760px;}
.answer-btn{display:flex;align-items:center;gap:14px;padding:18px 20px;border-radius:14px;border:none;cursor:pointer;font-family:'Syne',sans-serif;font-size:16px;font-weight:700;text-align:left;transition:transform .15s,filter .15s,opacity .3s,box-shadow .2s;min-height:64px;color:#fff;}
.answer-btn-a{background:var(--a);} .answer-btn-b{background:var(--b);}
.answer-btn-c{background:var(--c);} .answer-btn-d{background:var(--d);color:#1a1a1a;}
.answer-btn:hover:not(:disabled){transform:scale(1.03);filter:brightness(1.1);}
.answer-btn:disabled{cursor:default;}
.answer-icon{width:32px;height:32px;background:rgba(0,0,0,.2);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;flex-shrink:0;}

/* IMAGE answer buttons */
.answers-game-img{display:grid;grid-template-columns:1fr 1fr;gap:14px;width:100%;max-width:760px;}
.answer-img-btn{position:relative;border-radius:14px;border:4px solid transparent;cursor:pointer;overflow:hidden;aspect-ratio:4/3;transition:transform .15s,border-color .2s,opacity .3s;background:rgba(0,0,0,.3);display:block;width:100%;}
.answer-img-btn img{width:100%;height:100%;object-fit:cover;display:block;}
.answer-img-label{position:absolute;bottom:0;left:0;right:0;padding:10px 14px;font-family:'Syne',sans-serif;font-weight:800;font-size:14px;color:#fff;display:flex;align-items:center;gap:8px;}
.aib-a .answer-img-label{background:linear-gradient(transparent,rgba(226,27,60,.85));}
.aib-b .answer-img-label{background:linear-gradient(transparent,rgba(19,104,206,.85));}
.aib-c .answer-img-label{background:linear-gradient(transparent,rgba(38,137,12,.85));}
.aib-d .answer-img-label{background:linear-gradient(transparent,rgba(255,166,2,.85));}
.answer-img-btn:hover:not(:disabled){transform:scale(1.03);}
.answer-img-btn:disabled{cursor:default;}
.no-img-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:13px;min-height:100px;}

/* Multi-select */
.selected-multi{box-shadow:0 0 0 5px rgba(255,255,255,.8)!important;transform:scale(1.02)!important;}
.answer-img-btn.selected-multi{border-color:rgba(255,255,255,.8)!important;}
.confirm-multi-btn{font-family:'Syne',sans-serif;font-weight:800;font-size:16px;padding:14px 36px;border-radius:50px;border:none;cursor:pointer;background:linear-gradient(135deg,var(--c1),var(--c2));color:#fff;box-shadow:0 4px 20px rgba(255,60,172,.5);transition:transform .15s,box-shadow .15s,opacity .2s;}
.confirm-multi-btn:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 8px 30px rgba(255,60,172,.6);}
.confirm-multi-btn:disabled{opacity:.35;cursor:default;transform:none;}

/* Result states */
.answer-btn.correct,.answer-img-btn.correct{animation:correctPulse .5s ease;}
.answer-btn.wrong{opacity:.28;filter:grayscale(.5);}
.answer-img-btn.wrong{opacity:.2;filter:grayscale(.6);}
.answer-btn.highlight{box-shadow:0 0 0 5px rgba(255,255,255,.7),0 8px 32px rgba(0,0,0,.4);}
.answer-img-btn.highlight{border-color:rgba(255,255,255,.85)!important;border-width:5px;}
@keyframes correctPulse{0%{transform:scale(1)}40%{transform:scale(1.06)}100%{transform:scale(1)}}

/* RESULT OVERLAY */
.result-overlay{position:fixed;inset:0;background:rgba(13,13,26,.87);backdrop-filter:blur(8px);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:100;opacity:0;pointer-events:none;transition:opacity .4s;text-align:center;padding:24px;}
.result-overlay.show{opacity:1;pointer-events:all;}
.result-emoji{font-size:72px;animation:popIn .5s cubic-bezier(.34,1.56,.64,1);}
@keyframes popIn{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}
.result-label{font-family:'Syne',sans-serif;font-size:36px;font-weight:800;}
.result-correct-answer{font-size:15px;color:var(--muted);max-width:500px;}

/* SCORE */
#screen-score{gap:24px;max-width:600px;margin:0 auto;padding:40px 24px;justify-content:flex-start;background:radial-gradient(ellipse at 50% 10%,#1a0a4e 0%,transparent 70%),var(--bg);overflow-y:auto;}
.podium{display:flex;align-items:flex-end;justify-content:center;gap:12px;width:100%;margin:8px 0;}
.podium-col{display:flex;flex-direction:column;align-items:center;gap:8px;}
.podium-name{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;text-align:center;}
.podium-score-text{font-size:13px;color:var(--muted);}
.podium-block{border-radius:10px 10px 0 0;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:24px;width:90px;}
.podium-1 .podium-block{height:110px;background:linear-gradient(135deg,#FFD700,#FF8C00);}
.podium-2 .podium-block{height:80px;background:linear-gradient(135deg,#C0C0C0,#808080);}
.podium-3 .podium-block{height:60px;background:linear-gradient(135deg,#CD7F32,#8B4513);}
.score-list{width:100%;display:flex;flex-direction:column;gap:8px;}
.score-row{display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--card);border-radius:12px;border:1px solid rgba(255,255,255,.06);}
.score-rank{font-family:'Syne',sans-serif;font-weight:800;font-size:18px;width:28px;text-align:center;color:var(--muted);}
.score-name{flex:1;font-weight:600;}
.score-pts{font-family:'Syne',sans-serif;font-weight:700;font-size:17px;color:var(--c1);}

/* MISC */
@keyframes slideUp{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}
.animate-up{animation:slideUp .5s cubic-bezier(.22,1,.36,1) both;}
.confetti-wrap{position:fixed;inset:0;pointer-events:none;z-index:200;overflow:hidden;}
.confetti-piece{position:absolute;top:-20px;animation:fall linear forwards;}
@keyframes fall{to{transform:translateY(110vh) rotate(720deg);opacity:0}}
.pts-earned{position:fixed;font-family:'Syne',sans-serif;font-size:48px;font-weight:800;color:#4dc94d;text-shadow:0 0 30px rgba(107,203,119,.8);pointer-events:none;z-index:300;animation:floatUp 1.2s ease forwards;}
@keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-100px) scale(1.4)}}
::-webkit-scrollbar{width:6px} ::-webkit-scrollbar-track{background:transparent} ::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:3px}
select option{background:#260a45;}
</style>
</head>
<body>

<!-- SPLASH -->
<div id="screen-splash" class="screen active">
  <div style="position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:28px;">
    <div class="splash-tag">✦ Quiz de présentation</div>
    <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">
      <div style="background:var(--a);font-size:clamp(36px,7vw,70px);width:clamp(70px,12vw,120px);height:clamp(70px,12vw,120px);border-radius:18px;display:flex;align-items:center;justify-content:center;box-shadow:0 8px 32px rgba(226,27,60,.5);transform:rotate(-4deg)">🙋</div>
      <div style="background:var(--b);font-size:clamp(36px,7vw,70px);width:clamp(70px,12vw,120px);height:clamp(70px,12vw,120px);border-radius:18px;display:flex;align-items:center;justify-content:center;box-shadow:0 8px 32px rgba(19,104,206,.5);transform:rotate(3deg)">🕵️</div>
      <div style="background:var(--d);font-size:clamp(36px,7vw,70px);width:clamp(70px,12vw,120px);height:clamp(70px,12vw,120px);border-radius:18px;display:flex;align-items:center;justify-content:center;box-shadow:0 8px 32px rgba(255,166,2,.5);transform:rotate(-2deg)">❓</div>
      <div style="background:var(--c);font-size:clamp(36px,7vw,70px);width:clamp(70px,12vw,120px);height:clamp(70px,12vw,120px);border-radius:18px;display:flex;align-items:center;justify-content:center;box-shadow:0 8px 32px rgba(38,137,12,.5);transform:rotate(5deg)">🎯</div>
    </div>
    <h1 class="splash-title">Tu me connais ?</h1>
    <p class="splash-sub">Montre que tu sais qui je suis — réponds vite pour marquer plus de points !</p>
    <div class="btn-group">
      <button class="btn btn-primary" onclick="showScreen('screen-players')">▶ &nbsp;Jouer</button>
      <button class="btn btn-secondary" onclick="goToEditor()">✏️ &nbsp;Éditer les questions</button>
    </div>
  </div>
</div>

<!-- EDITOR -->
<div id="screen-editor" class="screen" style="display:none;flex-direction:column;align-items:stretch;justify-content:flex-start;">
  <div style="max-width:900px;width:100%;margin:0 auto;display:flex;flex-direction:column;gap:20px;padding:32px 0;">
    <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;">
      <h2 style="font-family:'Syne',sans-serif;font-size:28px;">✏️ Mes questions</h2>
      <div class="btn-group">
        <button class="btn btn-secondary btn-sm" onclick="showScreen('screen-splash')">← Retour</button>
        <button class="btn btn-primary btn-sm" onclick="saveAndPlay()">💾 Sauver &amp; Jouer</button>
      </div>
    </div>
    <div id="questions-list"></div>
    <button class="add-q-btn" onclick="addQuestion()">+ Ajouter une question</button>
  </div>
</div>

<!-- PLAYERS -->
<div id="screen-players" class="screen" style="display:none;">
  <h2 class="title" style="font-size:28px;margin-bottom:4px;">👥 Les joueurs</h2>
  <p style="color:var(--muted);margin-bottom:8px;">Ajoute les prénoms des participants</p>
  <div class="player-input-row">
    <input id="player-name-input" class="q-input" style="flex:1" placeholder="Prénom…" maxlength="20" onkeydown="if(event.key==='Enter') addPlayer()">
    <button class="btn btn-primary" onclick="addPlayer()">Ajouter</button>
  </div>
  <div class="players-wrap" id="players-wrap"></div>
  <div id="player-error" style="color:#ff4444;font-size:13px;min-height:18px;"></div>
  <div class="btn-group" style="margin-top:8px;">
    <button class="btn btn-secondary" onclick="showScreen('screen-splash')">← Retour</button>
    <button class="btn btn-primary" onclick="startGame()">🚀 Lancer !</button>
  </div>
</div>

<!-- GAME -->
<div id="screen-game" class="screen" style="display:none;">
  <div class="game-top">
    <div>
      <span class="game-progress" id="game-progress">Question 1 / 3</span><br>
      <span id="game-mode-badge" class="game-mode-badge badge-single">Choix unique</span>
    </div>
    <div class="timer-ring">
      <svg viewBox="0 0 64 64">
        <circle class="timer-bg" cx="32" cy="32" r="27"/>
        <circle class="timer-fg" id="timer-circle" cx="32" cy="32" r="27" stroke-dasharray="169.6" stroke-dashoffset="0"/>
      </svg>
      <div class="timer-number" id="timer-num">20</div>
    </div>
  </div>
  <div class="question-text" id="game-question"></div>
  <div id="game-answers-wrap"></div>
  <button class="confirm-multi-btn" id="confirm-multi-btn" style="display:none" onclick="confirmMulti()">✔ Valider mes réponses</button>
</div>

<!-- RESULT OVERLAY -->
<div class="result-overlay" id="result-overlay">
  <div class="result-emoji" id="result-emoji">🎉</div>
  <div class="result-label" id="result-label">Bonne réponse !</div>
  <div class="result-correct-answer" id="result-correct"></div>
  <div id="result-pts" style="font-family:'Syne',sans-serif;font-size:20px;color:#4dc94d;font-weight:800;"></div>
  <button class="btn btn-primary" onclick="nextQuestion()">Suivant →</button>
</div>

<!-- SCORE -->
<div id="screen-score" class="screen" style="display:none;overflow-y:auto;justify-content:flex-start;">
  <h2 class="title" style="font-size:32px;text-align:center;margin-top:16px;">🏆 Classement final</h2>
  <div class="podium" id="podium"></div>
  <div class="score-list" id="score-list"></div>
  <div class="btn-group" style="margin-top:16px;padding-bottom:32px;">
    <button class="btn btn-primary" onclick="restartGame()">🔄 Rejouer</button>
    <button class="btn btn-secondary" onclick="showScreen('screen-splash')">🏠 Accueil</button>
  </div>
</div>

<div class="confetti-wrap" id="confetti-wrap"></div>

<script>
const AVATAR_COLORS=['#FF3CAC','#784BA0','#2B86C5','#FF5C5C','#FFD93D','#6BCB77','#4D96FF','#FF9A3C','#C77DFF','#06D6A0'];
const CLRS=['a','b','c','d'], LBLS=['A','B','C','D'];

let questions = JSON.parse(localStorage.getItem('fx-q-v3')||'null') || [
  {text:"Dans quelle ville j'habite ?",type:'single',answerType:'text',answers:["Paris","Bondy","Lyon","Bordeaux"],images:[null,null,null,null],correct:[1],time:20},
  {text:"Quelle(s) passion(s) j'ai ?",type:'multi',answerType:'text',answers:["La randonnée","Le design","La cuisine","Le cinéma"],images:[null,null,null,null],correct:[1,3],time:25},
  {text:"Quel animal j'ai à la maison ?",type:'single',answerType:'text',answers:["Un chat","Un chien","Un lapin","Aucun"],images:[null,null,null,null],correct:[1],time:20},
];

let players=[], scores={}, currentQ=0, timerInterval=null, timeLeft=20, totalTime=20, answered=false, selectedMulti=new Set();

/* ── SCREENS ── */
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>{s.classList.remove('active');s.style.display='none';});
  const el=document.getElementById(id); el.style.display='flex';
  requestAnimationFrame(()=>el.classList.add('active'));
}
function goToEditor(){renderEditor();showScreen('screen-editor');}

/* ── EDITOR ── */
function renderEditor(){
  const list=document.getElementById('questions-list'); list.innerHTML='';
  questions.forEach((q,i)=>{
    const card=document.createElement('div');
    card.className='question-card animate-up';
    card.style.animationDelay=`${i*.05}s`;
    card.innerHTML=`
      <div style="display:flex;align-items:center;justify-content:space-between">
        <span class="q-number">Question ${i+1}</span>
        <button class="delete-btn" onclick="deleteQuestion(${i})">✕</button>
      </div>
      <textarea class="q-input" rows="2" placeholder="Ta question ici…" oninput="questions[${i}].text=this.value">${esc(q.text)}</textarea>
      <div style="display:flex;flex-wrap:wrap;gap:16px;align-items:flex-start;">
        <div>
          <div style="font-size:11px;color:var(--muted);margin-bottom:6px;letter-spacing:1px;text-transform:uppercase;">Type de réponse</div>
          <div class="type-selector">
            <button class="type-pill ${q.type==='single'?'active':''}" onclick="setQType(${i},'single',this)">☑ Choix unique</button>
            <button class="type-pill ${q.type==='multi'?'active':''}" onclick="setQType(${i},'multi',this)">☑☑ Choix multiples</button>
          </div>
        </div>
        <div>
          <div style="font-size:11px;color:var(--muted);margin-bottom:6px;letter-spacing:1px;text-transform:uppercase;">Format des réponses</div>
          <div class="type-selector">
            <button class="type-pill ${q.answerType==='text'?'active':''}" onclick="setAnswerType(${i},'text',this)">📝 Texte</button>
            <button class="type-pill ${q.answerType==='image'?'active':''}" onclick="setAnswerType(${i},'image',this)">🖼 Images</button>
          </div>
        </div>
      </div>
      <div id="ae-${i}">${renderAE(q,i)}</div>
      <div class="q-footer">
        <label style="font-size:13px;color:var(--muted);display:flex;align-items:center;gap:8px;">⏱ Temps :
          <select class="timer-select" onchange="questions[${i}].time=+this.value">
            ${[10,15,20,30,45,60].map(t=>`<option value="${t}" ${q.time===t?'selected':''}>${t}s</option>`).join('')}
          </select>
        </label>
        <span style="font-size:12px;color:var(--muted);">${q.type==='multi'?'Cases à cocher = plusieurs bonnes réponses':'Rond = bonne réponse unique'}</span>
      </div>`;
    list.appendChild(card);
  });
}

function renderAE(q,i){
  const bc=['badge-a','badge-b','badge-c','badge-d'];
  if(q.answerType==='image'){
    return `<div class="answers-grid">${q.answers.map((a,j)=>{
      const chk=q.type==='multi'?'checkbox':'radio';
      const chg=q.type==='multi'?`toggleM(${i},${j},this.checked)`:`setCorrect(${i},${j})`;
      return `<div class="img-answer-col">
        <div class="img-preview-wrap" onclick="document.getElementById('iu-${i}-${j}').click()">
          ${q.images[j]?`<img src="${q.images[j]}" alt="">`:''}
          <div class="img-upload-label">${q.images[j]?'🔄 Changer':'📷 Ajouter une image'}</div>
        </div>
        <input type="file" accept="image/*" class="img-upload-input" id="iu-${i}-${j}" onchange="uploadImg(${i},${j},this)">
        <div style="display:flex;align-items:center;gap:8px;">
          <div class="answer-badge ${bc[j]}">${LBLS[j]}</div>
          <input class="answer-input" placeholder="Légende (optionnel)" value="${esc(a)}" oninput="questions[${i}].answers[${j}]=this.value" style="flex:1">
          <input type="${chk}" name="c${i}" ${q.correct.includes(j)?'checked':''} class="correct-check" onchange="${chg}" title="Bonne réponse">
        </div>
      </div>`;
    }).join('')}</div>`;
  } else {
    return `<div class="answers-grid">${q.answers.map((a,j)=>{
      const chk=q.type==='multi'?'checkbox':'radio';
      const chg=q.type==='multi'?`toggleM(${i},${j},this.checked)`:`setCorrect(${i},${j})`;
      return `<div class="answer-row">
        <div class="answer-badge ${bc[j]}">${LBLS[j]}</div>
        <input class="answer-input" placeholder="Réponse ${LBLS[j]}" value="${esc(a)}" oninput="questions[${i}].answers[${j}]=this.value">
        <input type="${chk}" name="c${i}" ${q.correct.includes(j)?'checked':''} class="correct-check" onchange="${chg}" title="Bonne réponse">
      </div>`;
    }).join('')}</div>`;
  }
}

function setQType(i,t,btn){
  questions[i].type=t;
  if(t==='single'&&questions[i].correct.length>1) questions[i].correct=[questions[i].correct[0]];
  btn.closest('.type-selector').querySelectorAll('.type-pill').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById(`ae-${i}`).innerHTML=renderAE(questions[i],i);
}
function setAnswerType(i,t,btn){
  questions[i].answerType=t;
  btn.closest('.type-selector').querySelectorAll('.type-pill').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById(`ae-${i}`).innerHTML=renderAE(questions[i],i);
}
function setCorrect(i,j){questions[i].correct=[j];}
function toggleM(qi,ai,on){
  if(on){if(!questions[qi].correct.includes(ai))questions[qi].correct.push(ai);}
  else{questions[qi].correct=questions[qi].correct.filter(x=>x!==ai);}
}
function uploadImg(qi,ai,input){
  const f=input.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=e=>{questions[qi].images[ai]=e.target.result; document.getElementById(`ae-${qi}`).innerHTML=renderAE(questions[qi],qi);};
  r.readAsDataURL(f);
}
function addQuestion(){
  questions.push({text:'',type:'single',answerType:'text',answers:['','','',''],images:[null,null,null,null],correct:[0],time:20});
  renderEditor();
  document.getElementById('questions-list').lastElementChild.scrollIntoView({behavior:'smooth'});
}
function deleteQuestion(i){if(questions.length<=1)return; questions.splice(i,1); renderEditor();}
function saveAndPlay(){localStorage.setItem('fx-q-v3',JSON.stringify(questions)); showScreen('screen-players');}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

/* ── PLAYERS ── */
function addPlayer(){
  const inp=document.getElementById('player-name-input'),name=inp.value.trim(),err=document.getElementById('player-error');
  if(!name){err.textContent='Saisis un prénom.';return;}
  if(players.length>=12){err.textContent='Maximum 12 joueurs.';return;}
  if(players.includes(name)){err.textContent='Ce joueur est déjà ajouté.';return;}
  err.textContent=''; players.push(name); inp.value=''; renderPlayers(); inp.focus();
}
function removePlayer(name){players=players.filter(p=>p!==name);renderPlayers();}
function renderPlayers(){
  document.getElementById('players-wrap').innerHTML=players.map((p,i)=>`
    <div class="player-tag">
      <div class="player-avatar" style="background:${AVATAR_COLORS[i%AVATAR_COLORS.length]};color:#fff;width:28px;height:28px;">${p[0].toUpperCase()}</div>
      ${esc(p)}<button class="player-remove" onclick="removePlayer('${esc(p)}')">✕</button>
    </div>`).join('');
}

/* ── GAME ── */
function startGame(){
  if(!players.length){document.getElementById('player-error').textContent='Ajoute au moins un joueur !';return;}
  scores={}; players.forEach(p=>scores[p]=0); currentQ=0; showScreen('screen-game'); loadQ();
}
function loadQ(){
  answered=false; selectedMulti=new Set();
  const q=questions[currentQ];
  totalTime=q.time; timeLeft=q.time;
  document.getElementById('game-progress').textContent=`Question ${currentQ+1} / ${questions.length}`;
  document.getElementById('game-question').textContent=q.text;
  const badge=document.getElementById('game-mode-badge');
  badge.textContent=q.type==='multi'?'☑ Choix multiples':'☑ Choix unique';
  badge.className='game-mode-badge '+(q.type==='multi'?'badge-multi':'badge-single');
  const cb=document.getElementById('confirm-multi-btn');
  cb.style.display=q.type==='multi'?'block':'none'; cb.disabled=true;
  renderGameAnswers(q);
  startTimer();
}

function renderGameAnswers(q){
  const wrap=document.getElementById('game-answers-wrap');
  if(q.answerType==='image'){
    wrap.innerHTML=`<div class="answers-game-img">${q.answers.map((a,i)=>`
      <button class="answer-img-btn aib-${CLRS[i]}" id="ans-${i}" onclick="pickAnswer(${i})">
        ${q.images[i]?`<img src="${q.images[i]}" alt="${esc(a)}">`:`<div class="no-img-placeholder">📷 ${esc(a)||'Sans image'}</div>`}
        <div class="answer-img-label"><span style="background:rgba(0,0,0,.4);border-radius:6px;padding:2px 8px;flex-shrink:0">${LBLS[i]}</span>${esc(a)}</div>
      </button>`).join('')}</div>`;
  } else {
    wrap.innerHTML=`<div class="answers-game">${q.answers.map((a,i)=>`
      <button class="answer-btn answer-btn-${CLRS[i]}" id="ans-${i}" onclick="pickAnswer(${i})">
        <span class="answer-icon">${LBLS[i]}</span>${esc(a)}
      </button>`).join('')}</div>`;
  }
}

function pickAnswer(idx){
  if(answered) return;
  const q=questions[currentQ];
  if(q.type==='multi'){
    const btn=document.getElementById(`ans-${idx}`);
    if(selectedMulti.has(idx)){selectedMulti.delete(idx);btn.classList.remove('selected-multi');}
    else{selectedMulti.add(idx);btn.classList.add('selected-multi');}
    document.getElementById('confirm-multi-btn').disabled=selectedMulti.size===0;
  } else {
    finalizeAnswer([idx]);
  }
}
function confirmMulti(){if(selectedMulti.size) finalizeAnswer([...selectedMulti]);}

function finalizeAnswer(chosen){
  answered=true; clearInterval(timerInterval);
  document.getElementById('confirm-multi-btn').disabled=true;
  const q=questions[currentQ];
  const cSet=new Set(q.correct), chSet=new Set(chosen);
  const full=q.correct.every(c=>chSet.has(c))&&chosen.every(c=>cSet.has(c));
  const partial=q.type==='multi'&&!full&&chosen.every(c=>cSet.has(c))&&chosen.length>0;
  let pts=0;
  if(full) pts=Math.round(500+(timeLeft/totalTime)*500);
  else if(partial) pts=Math.round(100+(timeLeft/totalTime)*150);

  for(let i=0;i<4;i++){
    const btn=document.getElementById(`ans-${i}`);
    if(!btn) continue;
    btn.disabled=true;
    if(cSet.has(i)){btn.classList.add('correct','highlight');}
    else{btn.classList.add('wrong');}
  }

  const correctLabels=q.correct.map(c=>q.answers[c]).join(' + ');
  const ov=document.getElementById('result-overlay');
  document.getElementById('result-emoji').textContent=full?'🎉':partial?'🤏':'❌';
  document.getElementById('result-label').textContent=full?'Parfait !':partial?'Pas tout à fait…':'Raté !';
  document.getElementById('result-correct').textContent=`Bonne(s) réponse(s) : ${correctLabels}`;
  document.getElementById('result-pts').innerHTML=(pts>0&&players.length>0)?buildPicker(pts):'';
  ov.classList.add('show');
}

function buildPicker(pts){
  return `<div style="margin-top:6px"><div style="font-size:13px;color:var(--muted);margin-bottom:6px">Qui a répondu juste ?</div>${
    players.map(p=>`<button onclick="awardPts('${esc(p)}',${pts},this)" style="font-family:'Syne',sans-serif;font-weight:700;font-size:13px;padding:8px 16px;border-radius:50px;border:none;cursor:pointer;background:rgba(77,201,77,.2);color:#4dc94d;margin:4px;transition:background .2s" onmouseover="this.style.background='rgba(77,201,77,.4)'" onmouseout="this.style.background='rgba(77,201,77,.2)'">${esc(p)} +${pts}</button>`).join('')
  }</div>`;
}
function awardPts(p,pts,btn){
  scores[p]=(scores[p]||0)+pts; floatPts(`+${pts} ${p}`);
  btn.parentElement.parentElement.innerHTML=`<span style="color:#4dc94d;font-weight:700">✓ +${pts} pts → ${esc(p)}</span>`;
}

function timeUp(){
  answered=true;
  const q=questions[currentQ];
  for(let i=0;i<4;i++){const b=document.getElementById(`ans-${i}`);if(!b)continue;b.disabled=true;if(q.correct.includes(i))b.classList.add('correct','highlight');else b.classList.add('wrong');}
  document.getElementById('result-emoji').textContent='⏰';
  document.getElementById('result-label').textContent='Temps écoulé !';
  document.getElementById('result-correct').textContent=`Bonne(s) réponse(s) : ${q.correct.map(c=>q.answers[c]).join(' + ')}`;
  document.getElementById('result-pts').textContent='';
  document.getElementById('result-overlay').classList.add('show');
}

function startTimer(){
  clearInterval(timerInterval); updateTimer();
  timerInterval=setInterval(()=>{timeLeft--;updateTimer();if(timeLeft<=0){clearInterval(timerInterval);if(!answered)timeUp();}},1000);
}
function updateTimer(){
  const n=document.getElementById('timer-num'),c=document.getElementById('timer-circle');
  if(!n||!c)return;
  n.textContent=timeLeft;
  const p=timeLeft/totalTime;
  c.style.strokeDashoffset=169.6*(1-p);
  c.style.stroke=`hsl(${p>.5?140:p>.25?45:0},80%,60%)`;
  n.style.color=timeLeft<=5?'#ff4444':'inherit';
}

function nextQuestion(){
  document.getElementById('result-overlay').classList.remove('show');
  currentQ++;
  if(currentQ>=questions.length) showResults(); else loadQ();
}
function floatPts(txt){
  const el=document.createElement('div');el.className='pts-earned';el.textContent=txt;
  el.style.left=`${25+Math.random()*50}%`;el.style.top=`${35+Math.random()*30}%`;
  document.body.appendChild(el);setTimeout(()=>el.remove(),1400);
}

/* ── RESULTS ── */
function showResults(){
  launchConfetti(); showScreen('screen-score');
  const sorted=Object.entries(scores).sort((a,b)=>b[1]-a[1]);
  const pod=document.getElementById('podium'); pod.innerHTML='';
  [1,0,2].forEach(pos=>{
    if(!sorted[pos])return;
    const[name,pts]=sorted[pos],col=document.createElement('div');
    col.className=`podium-col podium-${pos+1}`;
    col.innerHTML=`<div class="podium-name">${['🥇','🥈','🥉'][pos]} ${esc(name)}</div><div class="podium-score-text">${pts} pts</div><div class="podium-block">${pos+1}</div>`;
    pod.appendChild(col);
  });
  document.getElementById('score-list').innerHTML=sorted.map(([n,p],i)=>`
    <div class="score-row" style="animation:slideUp .4s ${i*.07}s both">
      <div class="score-rank">${i+1}</div>
      <div style="background:${AVATAR_COLORS[players.indexOf(n)%AVATAR_COLORS.length]};color:#fff;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;font-family:'Syne',sans-serif;flex-shrink:0">${n[0].toUpperCase()}</div>
      <div class="score-name">${esc(n)}</div>
      <div class="score-pts">${p} pts</div>
    </div>`).join('');
}
function restartGame(){players.forEach(p=>scores[p]=0);currentQ=0;showScreen('screen-game');loadQ();}

/* ── CONFETTI ── */
function launchConfetti(){
  const wrap=document.getElementById('confetti-wrap'); wrap.innerHTML='';
  const cols=['#FF3CAC','#FFD93D','#6BCB77','#4D96FF','#FF5C5C','#C77DFF','#FF9A3C'];
  for(let i=0;i<80;i++){
    const el=document.createElement('div'); el.className='confetti-piece';
    el.style.cssText=`left:${Math.random()*100}%;background:${cols[~~(Math.random()*cols.length)]};width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;border-radius:${Math.random()>.5?'50%':'2px'};animation:fall ${1.5+Math.random()*2.5}s ${Math.random()*1.5}s linear forwards;`;
    wrap.appendChild(el);
  }
  setTimeout(()=>wrap.innerHTML='',6000);
}

document.addEventListener('DOMContentLoaded',()=>{
  document.getElementById('screen-splash').style.display='flex';
});
</script>
</body>
</html>
